<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ube Publisher — App distribution, on autopilot.</title>
  <link rel="icon" href="assets/logos/favicon.png" type="image/png" />
  <link rel="stylesheet" href="colors_and_type.css" />
  <link rel="stylesheet" href="kit.css" />
  <link rel="stylesheet" href="publisher.css" />
  <script>
    window.UBE_ASSETS = "assets";
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "lift",
      "wordmarkAccent": "bracket",
      "cardTone": "neutral",
      "heroVisual": "weekly"
    }/*EDITMODE-END*/;
  </script>

  <!-- Shared components -->
  <script type="text/babel" src="components/Icons.jsx"></script>
  <script type="text/babel" src="components/Wordmark.jsx"></script>

  <!-- Publisher-specific components -->
  <script type="text/babel" src="components/publisher/Icons.jsx"></script>
  <script type="text/babel" src="components/publisher/TopNav.jsx"></script>
  <script type="text/babel" src="components/publisher/StackMockup.jsx"></script>
  <script type="text/babel" src="components/publisher/CampaignMockup.jsx"></script>
  <script type="text/babel" src="components/publisher/WeeklyMockup.jsx"></script>
  <script type="text/babel" src="components/publisher/Hero.jsx"></script>
  <script type="text/babel" src="components/publisher/Problems.jsx"></script>
  <script type="text/babel" src="components/publisher/Orchestrator.jsx"></script>
  <script type="text/babel" src="components/publisher/StepMockups.jsx"></script>
  <script type="text/babel" src="components/publisher/HowItWorks.jsx"></script>
  <script type="text/babel" src="components/publisher/MoatStrip.jsx"></script>
  <script type="text/babel" src="components/publisher/Benefits.jsx"></script>
  <script type="text/babel" src="components/publisher/FAQ.jsx"></script>
  <script type="text/babel" src="components/publisher/FinalCta.jsx"></script>
  <script type="text/babel" src="components/publisher/Footer.jsx"></script>
  <script type="text/babel" src="components/publisher/RequestAccessModal.jsx"></script>

  <style>
    body[data-accent="lift"]  { --accent: oklch(0.62 0.20 319); --accent-hover: oklch(0.72 0.20 319); --accent-soft: oklch(0.36 0.12 319); --accent-tint: oklch(0.62 0.20 319 / 0.14); }
    body[data-accent="flesh"] { --accent: oklch(0.56 0.21 321); --accent-hover: oklch(0.66 0.21 321); --accent-soft: oklch(0.30 0.13 321); --accent-tint: oklch(0.56 0.21 321 / 0.14); }
    body[data-accent="heart"] { --accent: oklch(0.48 0.20 322); --accent-hover: oklch(0.58 0.20 322); --accent-soft: oklch(0.22 0.12 322); --accent-tint: oklch(0.48 0.20 322 / 0.14); }
    body[data-accent="deep"]  { --accent: oklch(0.40 0.17 324); --accent-hover: oklch(0.50 0.17 324); --accent-soft: oklch(0.18 0.09 324); --accent-tint: oklch(0.40 0.17 324 / 0.14); }

    body[data-card-tone="warm"]    { --card-bg: #1D1B15; --card-border: #2A2720; }
    body[data-card-tone="neutral"] { --card-bg: #161617; --card-border: #23232A; }
    body[data-card-tone="slate"]   { --card-bg: #13151B; --card-border: #21242E; }
    body[data-card-tone="plum"]    { --card-bg: #181320; --card-border: #251E33; }
    body[data-card-tone="forest"]  { --card-bg: #121814; --card-border: #1F2A23; }
  </style>
</head>
<body data-accent="lift" data-card-tone="neutral">

<div id="app"></div>

<script type="text/babel" data-presets="env,react">
function App() {
  const [modal, setModal] = React.useState({ open: false, source: null });
  const [tweaks, setTweaks] = React.useState(window.TWEAK_DEFAULTS);

  React.useEffect(() => {
    document.body.setAttribute("data-accent",    tweaks.accent);
    document.body.setAttribute("data-card-tone", tweaks.cardTone);
  }, [tweaks.accent, tweaks.cardTone]);

  // Tweaks-panel protocol — listen first, then announce availability.
  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode")   window.__setTweaksOpen?.(true);
      if (d.type === "__deactivate_edit_mode") window.__setTweaksOpen?.(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const onRequestAccess = (source) => setModal({ open: true, source });
  const onClose = () => setModal({ ...modal, open: false });
  const onTweak = (patch) => {
    setTweaks((t) => ({ ...t, ...patch }));
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: patch }, "*");
  };

  return (
    <React.Fragment>
      <PublisherTopNav wordmarkAccent={tweaks.wordmarkAccent} onRequestAccess={onRequestAccess} />
      <main>
        <PublisherHero
          heroVisual={tweaks.heroVisual}
          onRequestAccess={onRequestAccess}
        />
        <PublisherProblems />
        <Orchestrator />
        <PublisherHowItWorks />
        <MoatStrip />
        <PublisherBenefits />
        <PublisherFAQ />
        <PublisherFinalCta onRequestAccess={onRequestAccess} />
      </main>
      <PublisherFooter wordmarkAccent={tweaks.wordmarkAccent} />
      <RequestAccessModal open={modal.open} source={modal.source} onClose={onClose} />

      <TweaksPanel tweaks={tweaks} onTweak={onTweak} />
    </React.Fragment>
  );
}

/* Minimal in-page Tweaks panel — uses inline styles so the design
   system stays untouched. Toggled by the host toolbar. */
function TweaksPanel({ tweaks, onTweak }) {
  const [open, setOpen] = React.useState(false);
  React.useEffect(() => { window.__setTweaksOpen = setOpen; }, []);
  if (!open) return null;
  const Row = ({ label, children }) => (
    <div style={{ display: "grid", gridTemplateColumns: "92px 1fr", gap: 10, alignItems: "center", marginBottom: 12 }}>
      <span className="mono" style={{ fontSize: 10.5, color: "var(--muted)", textTransform: "uppercase", letterSpacing: 0.7 }}>{label}</span>
      <div>{children}</div>
    </div>
  );
  const Seg = ({ value, opts, onChange }) => (
    <div style={{ display: "flex", gap: 4, background: "var(--canvas)", border: "1px solid var(--hairline-strong)", padding: 3, borderRadius: 8 }}>
      {opts.map(o => (
        <button key={o.v} onClick={() => onChange(o.v)}
          style={{
            flex: 1, padding: "6px 8px",
            background: value === o.v ? "var(--surface-elevated)" : "transparent",
            color: value === o.v ? "var(--ink)" : "var(--body)",
            border: 0, borderRadius: 6, cursor: "pointer",
            fontFamily: "var(--font-mono)", fontSize: 11, letterSpacing: 0.4,
          }}>{o.l}</button>
      ))}
    </div>
  );
  const Swatch = ({ value, opts, onChange }) => (
    <div style={{ display: "flex", gap: 6 }}>
      {opts.map(o => (
        <button key={o.v} onClick={() => onChange(o.v)}
          aria-label={o.v}
          style={{
            width: 28, height: 28, borderRadius: "50%",
            background: o.color,
            border: value === o.v ? "2px solid var(--ink)" : "1px solid var(--hairline-strong)",
            cursor: "pointer", padding: 0,
          }} />
      ))}
    </div>
  );
  return (
    <div style={{
      position: "fixed", bottom: 20, right: 20, zIndex: 500,
      width: 304, padding: 18,
      background: "var(--surface-card)",
      border: "1px solid var(--hairline-strong)",
      borderRadius: "var(--r-lg)",
      boxShadow: "0 16px 40px rgba(0,0,0,0.6)",
    }}>
      <div style={{ display: "flex", alignItems: "center", marginBottom: 14 }}>
        <span className="eyebrow" style={{ fontSize: 10.5 }}>TWEAKS</span>
        <span style={{ flex: 1 }} />
        <button onClick={() => { setOpen(false); window.parent.postMessage({ type: "__edit_mode_dismissed" }, "*"); }}
          style={{ background: "none", border: 0, color: "var(--muted)", cursor: "pointer", padding: 4 }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M6 6l12 12M18 6l-12 12"/></svg>
        </button>
      </div>
      <Row label="Accent">
        <Swatch value={tweaks.accent} onChange={(v) => onTweak({ accent: v })} opts={[
          { v: "lift",  color: "oklch(0.62 0.20 319)" },
          { v: "flesh", color: "oklch(0.56 0.21 321)" },
          { v: "heart", color: "oklch(0.48 0.20 322)" },
          { v: "deep",  color: "oklch(0.40 0.17 324)" },
        ]}/>
      </Row>
      <Row label="Wordmark">
        <Seg value={tweaks.wordmarkAccent} onChange={(v) => onTweak({ wordmarkAccent: v })}
          opts={[{ v: "bracket", l: "[ u ]" }, { v: "umlaut", l: "ü" }, { v: "cursor", l: "ube|" }]} />
      </Row>
      <Row label="Card tone">
        <Seg value={tweaks.cardTone} onChange={(v) => onTweak({ cardTone: v })}
          opts={[{ v: "neutral", l: "Neutral" }, { v: "warm", l: "Warm" }, { v: "plum", l: "Plum" }, { v: "slate", l: "Slate" }]} />
      </Row>
      <Row label="Hero">
        <Seg value={tweaks.heroVisual} onChange={(v) => onTweak({ heroVisual: v })}
          opts={[{ v: "stack", l: "Stack" }, { v: "campaign", l: "Campaign" }, { v: "weekly", l: "Weekly" }]} />
      </Row>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>

</body>
</html>
