<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Ube — Maintainer</title>
  <!-- Soft redirect to the homepage. Intentionally not a permanent (301-style)
       redirect: /publisher/ will become a distinct landing page soon, and we
       don't want crawlers to permanently fold this URL into the homepage. -->
  <meta http-equiv="refresh" content="0; url=https://ube.dev/"/>
  <meta name="robots" content="noindex"/>
  <link rel="canonical" href="https://ube.dev/"/>

  <link rel="icon" type="image/png" sizes="192x192" href="/assets/favicons/favicon-light.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/favicons/favicon-dark.png" media="(prefers-color-scheme: dark)"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/apple-touch-icon.png"/>
  <script>window.location.replace("https://ube.dev/");</script>
</head>
<body>
  <p>Redirecting to <a href="https://ube.dev/">Ube</a>…</p>
</body>
</html>
