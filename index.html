<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ube — An agent that maintains your app</title>
  <meta name="description" content="Ube listens to crash feeds, error dashboards, app reviews, and dependency releases — then triages, reproduces, and opens verified PRs against your repo."/>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"/>

  <link rel="stylesheet" href="styles.css"/>

  <!-- Google reCAPTCHA v3 — used by Basin for spam protection on the request-access form -->
  <script src="https://www.google.com/recaptcha/api.js?render=6Les66kUAAAAANyLrgkl7iuN4JUpNlB5upaMovI4"></script>

  <!-- React + Babel pinned versions -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.4/babel.min.js" integrity="sha384-qVgGRi0TCdh+xrBD9+4kG0YlkbOkWu2J3CB46EekpYQmtM96n9v+uaKIS5ipaqKb" crossorigin="anonymous"></script>

  <!-- Amplitude Analytics + Session Replay (Unified Script — Amplitude CDN) -->
  <link rel="preconnect" href="https://cdn.amplitude.com"/>
  <script src="https://cdn.amplitude.com/script/7fdbc1ae75a64eb50d90f29ac9721390.js"></script>
  <script>
    {
      const h = location.hostname
      const enabled = h === "ube.dev" || h.endsWith(".ube.dev") || location.search.includes("amplitude=1")
      if (enabled) {
        window.amplitude.add(window.sessionReplay.plugin({ sampleRate: 1 }))
        window.amplitude.init("7fdbc1ae75a64eb50d90f29ac9721390", {
          defaultTracking: true,
          autocapture: true,
          fetchRemoteConfig: true,
        })
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <!-- Component scripts (order matters — assets & mockups before components & app) -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="assets.jsx"></script>
  <script type="text/babel" src="mockups.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
