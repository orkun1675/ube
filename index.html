<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ube — An agent that maintains your app</title>
  <meta name="description" content="Ube listens to crash feeds, error dashboards, app reviews, and dependency releases — then triages, reproduces, and opens verified PRs against your repo."/>
  <link rel="canonical" href="https://ube.dev/"/>

  <!-- Favicons. Light default; dark variant served via media query on
       browsers that honor `media` on <link rel="icon"> (Firefox; recent
       Chromium). The white "u" in the dark PNG is invisible on light
       tabs, which is why light is the safer default. -->
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/favicons/favicon-light.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/favicons/favicon-dark.png" media="(prefers-color-scheme: dark)"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/apple-touch-icon.png"/>

  <!-- Open Graph / social preview -->
  <meta property="og:type" content="website"/>
  <meta property="og:site_name" content="Ube"/>
  <meta property="og:url" content="https://ube.dev/"/>
  <meta property="og:title" content="Ube — An agent that maintains your app"/>
  <meta property="og:description" content="Ube listens to crash feeds, error dashboards, app reviews, and dependency releases — then triages, reproduces, and opens verified PRs against your repo."/>
  <meta property="og:image" content="https://ube.dev/assets/social/og-image.png"/>
  <meta property="og:image:width" content="1200"/>
  <meta property="og:image:height" content="630"/>
  <meta property="og:image:alt" content="Ube — App maintenance, on autopilot."/>

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="Ube — An agent that maintains your app"/>
  <meta name="twitter:description" content="Ube listens to crash feeds, error dashboards, app reviews, and dependency releases — then triages, reproduces, and opens verified PRs against your repo."/>
  <meta name="twitter:image" content="https://ube.dev/assets/social/og-image.png"/>

  <!-- Structured data for search + AI answer engines. Keep these in raw HTML
       (not injected by React) so non-JS crawlers can read them. FAQPage
       answers must match the visible copy in src/components/sections/faq.jsx
       verbatim — if you change one, change both. -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Ube",
    "url": "https://ube.dev/",
    "logo": "https://ube.dev/assets/favicons/apple-touch-icon.png",
    "description": "Ube is an AI agent that maintains mobile and cross-platform apps — triaging crash reports, user feedback, and dependency upgrades, then opening verified pull requests against your repo.",
    "sameAs": [
      "https://github.com/orkun1675/ube"
    ]
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Ube Maintainer",
    "url": "https://ube.dev/",
    "applicationCategory": "DeveloperApplication",
    "operatingSystem": "Web",
    "description": "An agent that listens to crash feeds, error dashboards, app reviews, and dependency releases — then triages, reproduces, and opens verified PRs against your repo. Supports React Native, Expo, Flutter, native iOS (Swift / Obj-C), native Android (Kotlin / Java), and Capacitor / Ionic.",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD",
      "availability": "https://schema.org/PreOrder"
    }
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "Does Ube auto-merge, or does it only open PRs for review?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Ube always opens PRs — you stay in control of what ships. Auto-merge is opt-in per repository, and even then it's gated behind your existing branch protections and required checks."
        }
      },
      {
        "@type": "Question",
        "name": "Where does my code go?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Your code runs in ephemeral, per-repo sandboxes that are destroyed after each job. We don't train on your code, and we don't keep it after the run. Self-hosting is offered for enterprise customers with strict privacy requirements."
        }
      },
      {
        "@type": "Question",
        "name": "Which frameworks and platforms does Ube support?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "React Native, Expo, Flutter, native iOS (Swift / Obj-C), native Android (Kotlin / Java), and Capacitor / Ionic out of the box. Other stacks can be onboarded on request — get in touch."
        }
      },
      {
        "@type": "Question",
        "name": "What if Ube makes a bad fix?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Every PR runs your tests plus a generated regression suite before opening, and the diff is yours to review. Marking a fix rejected teaches Ube to avoid that approach for the same signature — it gets better at your codebase over time."
        }
      }
    ]
  }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"/>

  <link rel="stylesheet" href="src/styles.css"/>

  <!-- reCAPTCHA v3 (used by Basin for spam protection on the request-access form)
       is lazy-loaded from the modal — see src/components/modals/request-access-modal.jsx.
       Loading it up-front blocks render and pulls Google trackers for every visitor. -->

  <!-- React + Babel pinned versions -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.4/babel.min.js" integrity="sha384-qVgGRi0TCdh+xrBD9+4kG0YlkbOkWu2J3CB46EekpYQmtM96n9v+uaKIS5ipaqKb" crossorigin="anonymous"></script>

  <!-- Amplitude Analytics + Session Replay (Unified Script — Amplitude CDN) -->
  <link rel="preconnect" href="https://cdn.amplitude.com"/>
  <script src="https://cdn.amplitude.com/script/7fdbc1ae75a64eb50d90f29ac9721390.js"></script>
  <script>
    {
      const h = location.hostname
      const enabled = h === "ube.dev" || h.endsWith(".ube.dev") || location.search.includes("amplitude=1")
      if (enabled) {
        window.amplitude.add(window.sessionReplay.plugin({ sampleRate: 1 }))
        window.amplitude.init("7fdbc1ae75a64eb50d90f29ac9721390", {
          defaultTracking: true,
          autocapture: true,
          fetchRemoteConfig: true,
        })
      }
    }
  </script>
</head>
