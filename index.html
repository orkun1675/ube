<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ube — An agent that maintains your app</title>
  <meta name="description" content="Ube listens to crash feeds, error dashboards, app reviews, and dependency releases — then triages, reproduces, and opens verified PRs against your repo."/>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"/>

  <link rel="stylesheet" href="styles.css"/>

  <!-- React + Babel pinned versions -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.4/babel.min.js" integrity="sha384-qVgGRi0TCdh+xrBD9+4kG0YlkbOkWu2J3CB46EekpYQmtM96n9v+uaKIS5ipaqKb" crossorigin="anonymous"></script>

  <!-- Amplitude Analytics + Session Replay (Unified Browser SDK) -->
  <script src="https://unpkg.com/@amplitude/unified@1.1.9/lib/scripts/amplitude-min.umd.js"></script>
  <script>
    window.amplitude.initAll('7fdbc1ae75a64eb50d90f29ac9721390', {"analytics":{"autocapture":true},"sessionReplay":{"sampleRate":1}});
  </script>
</head>
<body>
  <div id="root"></div>

  <!-- Component scripts (order matters — assets & mockups before components & app) -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="assets.jsx"></script>
  <script type="text/babel" src="mockups.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
